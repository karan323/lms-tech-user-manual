<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#iconGrad)"/>

  <!-- N path + triangle shape -->
  <path d="M16 48 L32 16 L48 48" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- top node dot -->
  <circle cx="32" cy="16" r="5" fill="url(#dotGrad)"/>
  <!-- bottom connector line -->
  <line x1="16" y1="48" x2="48" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <!-- bottom node dots -->
  <circle cx="16" cy="48" r="3.5" fill="white" opacity="0.75"/>
  <circle cx="48" cy="48" r="3.5" fill="white" opacity="0.75"/>

  <!-- Wordmark: NexaLearn -->
  <text x="74" y="38" font-family="'Segoe UI',system-ui,sans-serif" font-size="26" font-weight="800" fill="url(#textGrad)">NexaLearn</text>

  <!-- Sub-label: SOLUTIONS -->
  <text x="75" y="55" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="3">SOLUTIONS</text>
</svg>
